name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
    steps:
      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v2

  build:
    needs: create-release
    permissions:
      contents: write
    strategy:
      fail-fast: false
      platforms: [macos-latest, windows-latest, ubuntu-latest]

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-action@stable

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install npm dependencies
        run: npm ci

      - name: Build Tauri app
        run: npm run tauri build
        env:
          CI: true

      - name: Upload macOS artifacts
        if: matrix.platform == 'macos-latest'
        uses: softprops/upload-gh-release-asset@v1
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: src-tauri/target/release/bundle/dmg/Hermes Provider Switcher_1.0.0_aarch64.dmg
          asset_name: Hermes-Provider-Switcher_${{ github.ref_name }}_macos.dmg

      - name: Upload Windows artifacts
        if: matrix.platform == 'windows-latest'
        uses: softprops/upload-gh-release-asset@v1
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: src-tauri/target/release/bundle/nsis/*.exe
          asset_name: Hermes-Provider-Switcher_${{ github.ref_name }}_windows-setup.exe

      - name: Upload Linux artifacts
        if: matrix.platform == 'ubuntu-latest'
        uses: softprops/upload-gh-release-asset@v1
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: src-tauri/target/release/bundle/deb/*.deb
          asset_name: Hermes-Provider-Switcher_${{ github.ref_name }}_amd64.deb
